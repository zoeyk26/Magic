	<h1>Apple Pancake Sugar Mixture</h1>
	<p><b>Ingredients</b></p>
	<ul>
		<li>1/2 cup dark brown sugar</li>
		<li>2 tablespoons sugar</li>
		<li>1 tablespoon cinnamon</li>
	</ul>
	<p><b>Instructions</b></p>
	<ol>
		<li>Top pancake with sugar mixture and dot with butter</li>
		<li>Bake about 10-15 minutes longer</li>
	</ol>
